[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/bin/bash -c "sed -i 's|/etc/letsencrypt/live/volflowagent.com/||g' /etc/nginx/sites-available/llmtrader 2>/dev/null; /usr/sbin/nginx -g 'daemon off;'"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:uvicorn]
command=/usr/local/bin/uvicorn backend.server:app --host 127.0.0.1 --port 8000 --workers 4
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
environment=PYTHONUNBUFFERED="1"
