version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: llmtrader-db
    environment:
      POSTGRES_DB: llmtrader
      POSTGRES_USER: llmtrader
      POSTGRES_PASSWORD: ${DB_PASSWORD:-llmtrader_secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmtrader"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - llmtrader-network

  # LLMtrader Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmtrader-app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Database
      DATABASE_URL: postgresql://llmtrader:${DB_PASSWORD:-llmtrader_secure_password_change_me}@postgres:5432/llmtrader
      
      # Application
      APP_ENV: production
      APP_DEBUG: "false"
      
      # Domain
      DOMAIN: volflowagent.com
    volumes:
      # SSL certificates (will be generated by certbot)
      - ./ssl:/etc/letsencrypt
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - llmtrader-network

volumes:
  postgres_data:
    driver: local

networks:
  llmtrader-network:
    driver: bridge
